# Fill in real values before first deploy. Never commit with actual IDs — use
# secrets manager or CI secrets to inject them at deploy time.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redemption-service
  namespace: redemption
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/redemption-prod-redemption-svc
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redemption-config
  namespace: redemption
data:
  app.yaml: |
    queue:
      type: sqs
      url: https://sqs.ap-southeast-1.amazonaws.com/ACCOUNT_ID/redemption-events
      maxMessages: 10
      visibilityTimeout: 60
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redemption-ingress
  namespace: redemption
  annotations:
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-southeast-1:ACCOUNT_ID:certificate/CERT_ID
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:ap-southeast-1:ACCOUNT_ID:regional/webacl/redemption-prod-waf/WAF_ID
