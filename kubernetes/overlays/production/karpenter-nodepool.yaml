# Karpenter spot nodepool for burst scaling
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: redemption-burst
spec:
  template:
    metadata:
      labels:
        role: burst
        tier: compute
        managed-by: karpenter
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["m6i", "m6a", "m5", "m5a", "c6i", "c6a"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["large", "xlarge", "2xlarge"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: topology.kubernetes.io/zone
          operator: In
          values:
            - ap-southeast-1a
            - ap-southeast-1b
            - ap-southeast-1c

      expireAfter: 720h # rotate every 30d for patching

  limits:
    cpu: "80"     # 1000m/pod × 60 max pods = 60 CPUs; headroom for scheduling overhead
    memory: "160Gi"  # 1Gi/pod × 60 max pods = 60Gi; headroom for system overhead

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 10m  # 10m > HPA scale-down stabilization (300s) to avoid disrupting draining pods

  weight: 10

---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023

  subnetSelectorTerms:
    - tags:
        kubernetes.io/role/internal-elb: "1"

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: redemption-prod

  instanceProfile: redemption-prod-node-profile

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        encrypted: true
        deleteOnTermination: true

  tags:
    Project: the-redemption
    ManagedBy: karpenter
    Environment: production

  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required # IMDSv2
