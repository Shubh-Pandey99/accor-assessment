apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudwatch-config
  namespace: redemption
data:
  cwagentconfig.json: |
    {
      "logs": {
        "logs_collected": {
          "files": {
            "collect_list": [
              {
                "file_path": "/var/log/containers/redemption-service*",
                "log_group_name": "/eks/redemption-prod/app/redemption",
                "log_stream_name": "{hostname}/{container_name}",
                "timezone": "UTC"
              }
            ]
          }
        },
        "force_flush_interval": 5
      }
    }

---
# App configuration mounted into pods via /app/config
apiVersion: v1
kind: ConfigMap
metadata:
  name: redemption-config
  namespace: redemption
data:
  app.yaml: |
    server:
      port: 8080
      grpc_port: 9090
      shutdown_timeout: 60s
    logging:
      level: info
      format: json
    aws:
      region: ap-southeast-1
      secrets_path: redemption/app-config
