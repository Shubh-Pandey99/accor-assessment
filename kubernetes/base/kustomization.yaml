apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: redemption

resources:
  - namespace.yaml
  - app/serviceaccount.yaml
  - app/configmap.yaml
  - app/deployment.yaml
  - app/service.yaml
  - app/ingress.yaml
  - hpa/hpa.yaml
  - pdb/pdb.yaml
  - network-policies/network-policy.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: the-redemption
    includeSelectors: true
