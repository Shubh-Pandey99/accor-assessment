apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: redemption

resources:
  - namespace.yaml
  - app/deployment.yaml
  - app/service.yaml
  - app/ingress.yaml
  - app/karpenter-nodepool.yaml
  - hpa/hpa.yaml
  - pdb/pdb.yaml
  - network-policies/network-policy.yaml
  - monitoring/fluent-bit.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: the-redemption
    includeSelectors: true
