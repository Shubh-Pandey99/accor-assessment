apiVersion: v1
kind: Service
metadata:
  name: redemption-service
  namespace: redemption
  labels:
    app.kubernetes.io/name: redemption-service
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: grpc
      protocol: TCP
  selector:
    app.kubernetes.io/name: redemption-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redemption-config
  namespace: redemption
  labels:
    app.kubernetes.io/name: redemption-service
data:
  app.yaml: |
    server:
      port: 8080
      grpcPort: 9090
      readTimeout: 30s
      writeTimeout: 30s
      shutdownTimeout: 30s

    database:
      type: dynamodb
      tableName: redemption-transactions
      region: ap-southeast-1

    queue:
      type: sqs
      url: https://sqs.ap-southeast-1.amazonaws.com/ACCOUNT_ID/redemption-events
      maxMessages: 10
      visibilityTimeout: 60

    # Redis endpoint injected at deploy time — not hardcoded because it's a Terraform output.
    cache:
      type: elasticache
      endpoint: "${REDIS_ENDPOINT}"  # injected at deploy time via External Secrets or env patch
      ttl: 300

    rateLimit:
      enabled: true
      requestsPerSecond: 1000
      burst: 5000

    circuitBreaker:
      enabled: true
      threshold: 5
      timeout: 30s
      maxRequests: 100
