apiVersion: v1
kind: ConfigMap
metadata:
  name: redemption-config
  namespace: redemption
data:
  config.yaml: |
    server:
      port: 8080
      readTimeout: 30s
      writeTimeout: 30s
      shutdownTimeout: 30s

    database:
      type: dynamodb
      tableName: redemption-transactions
      region: ap-southeast-1

    queue:
      type: sqs
      url: https://sqs.ap-southeast-1.amazonaws.com/ACCOUNT_ID/redemption-events
      maxMessages: 10
      visibilityTimeout: 60

    cache:
      type: elasticache
      # endpoint: REPLACE_WHEN_ELASTICACHE_PROVISIONED
      ttl: 300

    rateLimit:
      enabled: false
      requestsPerSecond: 1000   # placeholder — tune based on baseline traffic
      burst: 100                 # placeholder — tune based on baseline traffic
