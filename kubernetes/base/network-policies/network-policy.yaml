# Default deny everything, then allow what we need
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: redemption
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow inbound from ALB
# ALB sends traffic directly to pod IPs in IP target mode; source is public subnet CIDR, not controller pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-alb
  namespace: redemption
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redemption-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.0.0/20   # public subnet AZ-a (cidrsubnet 10.0.0.0/16, 4, 0)
        - ipBlock:
            cidr: 10.0.16.0/20  # public subnet AZ-b (cidrsubnet 10.0.0.0/16, 4, 1)
        - ipBlock:
            cidr: 10.0.32.0/20  # public subnet AZ-c (cidrsubnet 10.0.0.0/16, 4, 2)
      ports:
        - protocol: TCP
          port: 8080
---
# Egress to AWS services + cache + monitoring
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-aws-services
  namespace: redemption
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redemption-service
  policyTypes:
    - Egress
  egress:
    # DNS - target CoreDNS pods specifically, not the whole kube-system namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # AWS services — ECR/DynamoDB/STS via VPC endpoints, SQS/CloudWatch/Secrets via NAT
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

    # Redis
    - to:
        - ipBlock:
            cidr: 10.0.128.0/20
      ports:
        - protocol: TCP
          port: 6379

