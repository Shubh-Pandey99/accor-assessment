# Default deny everything, then allow what we need
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: redemption
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow inbound from ALB (via kube-system ingress controller)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-alb
  namespace: redemption
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redemption-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 8080
---
# Egress to AWS services + cache + monitoring
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-aws-services
  namespace: redemption
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redemption-service
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # AWS services via VPC endpoints
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 443

    # Redis
    - to:
        - ipBlock:
            cidr: 10.0.128.0/20
      ports:
        - protocol: TCP
          port: 6379

