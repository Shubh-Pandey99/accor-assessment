# Asymmetric scaling: fast scale-up for flash sales, slow scale-down to prevent flapping
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: redemption-hpa
  namespace: redemption
  labels:
    app.kubernetes.io/name: redemption-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: redemption-service

  minReplicas: 6
  maxReplicas: 60

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 10
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
      selectPolicy: Min
