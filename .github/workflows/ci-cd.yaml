name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  EKS_CLUSTER: redemption-prod

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform validate
        run: |
          cd terraform
          # -backend=false skips remote state — terraform plan is intentionally excluded
          # from CI because it requires live AWS credentials and a bootstrapped backend.
          # Run `terraform plan` locally or in a separate privileged workflow before applying.
          terraform init -backend=false
          terraform validate
          terraform fmt -check -recursive

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.x"

      - name: Lint Kubernetes manifests
        run: |
          kustomize build kubernetes/overlays/production > /dev/null

      - name: Check for unresolved placeholders
        run: |
          # ACCOUNT_ID / CERT_ID / WAF_ID must be present in source — the deploy job's
          # sed replaces them from secrets. If they're absent, sed would silently produce
          # a broken manifest (image URLs, cert ARNs, WAF ARNs all unset).
          for token in ACCOUNT_ID CERT_ID WAF_ID; do
            if ! grep -rq "$token" kubernetes/overlays/production/; then
              echo "ERROR: $token missing from kubernetes/overlays/production/ — sed substitution target absent"
              exit 1
            fi
          done

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for AWS Credentials
        id: check_creds
        run: |
          if [ -z "$DEPLOY_ROLE" ]; then
            echo "AWS_DEPLOY_ROLE_ARN secret is missing. Skipping deployment steps."
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.check_creds.outputs.skip_deploy != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and push image
        if: steps.check_creds.outputs.skip_deploy != 'true'
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin $ECR_REGISTRY
          docker build -t $ECR_REGISTRY/redemption-service:${{ github.sha }} .
          docker push $ECR_REGISTRY/redemption-service:${{ github.sha }}

      - name: Install kustomize
        if: steps.check_creds.outputs.skip_deploy != 'true'
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.x"

      - name: Inject account-specific secrets into manifests
        if: steps.check_creds.outputs.skip_deploy != 'true'
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          ACM_CERT_ID: ${{ secrets.ACM_CERT_ID }}
          WAF_RULE_ID: ${{ secrets.WAF_RULE_ID }}
        run: |
          find kubernetes/ -name '*.yaml' -exec sed -i \
            -e "s/ACCOUNT_ID/${AWS_ACCOUNT_ID}/g" \
            -e "s/CERT_ID/${ACM_CERT_ID}/g" \
            -e "s/WAF_ID/${WAF_RULE_ID}/g" \
            {} +

      - name: Verify no placeholders remain post-substitution
        if: steps.check_creds.outputs.skip_deploy != 'true'
        run: |
          if kustomize build kubernetes/overlays/production | \
            grep -Eq 'ACCOUNT_ID|CERT_ID|WAF_ID|REPLACE_AFTER_DEPLOY|YOUR_VPN_CIDR|REDIS_ENDPOINT'; then
            echo "ERROR: unresolved placeholders after secret injection"
            exit 1
          fi

      - name: Deploy to EKS
        if: steps.check_creds.outputs.skip_deploy != 'true'
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION
          cd kubernetes/overlays/production
          kustomize edit set image redemption-service=${{ secrets.ECR_REGISTRY }}/redemption-service:${{ github.sha }}
          kubectl apply -k .
          kubectl rollout status deployment/redemption-service -n redemption --timeout=300s
